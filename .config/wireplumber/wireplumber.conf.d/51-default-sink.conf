monitor.alsa.rules = [
  # Built-in audio device - enable auto-profile/port switching on jack detect
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_80_1f.3-platform-skl_hda_dsp_generic"
      }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = true
        api.acp.auto-port = true
      }
    }
  }
  # USB/Bluetooth headsets - highest priority (auto-switch when connected)
  {
    matches = [
      {
        device.bus = "usb"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 2000
        priority.session = 2000
      }
    }
  }
  # Built-in speakers - lower priority (fallback when headset unplugged)
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_80_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "Built-in Speakers"
        priority.driver = 1000
        priority.session = 1000
      }
    }
  }
]
