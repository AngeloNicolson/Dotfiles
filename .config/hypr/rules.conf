# Float all windows by default with consistent size
windowrule = float on, match:class (.*)
windowrule = size 75% 80%, match:class (.*)

# Foot terminal - frosted glass
windowrule = opacity 0.8 0.7, match:class foot

# ╻ ╻┏━┓┏━┓╻┏ ┏━┓┏━┓┏━┓┏━╸┏━╸   ┏━┓╻ ╻╻  ┏━╸┏━┓
# ┃╻┃┃ ┃┣┳┛┣┻┓┗━┓┣━┛┣━┫┃  ┣╸    ┣┳┛┃ ┃┃  ┣╸ ┗━┓
# ┗┻┛┗━┛╹┗╸╹ ╹┗━┛╹  ╹ ╹┗━╸┗━╸   ╹┗╸┗━┛┗━╸┗━╸┗━┛

workspace=special,gapsin:24,gapsout:64

# ╻  ┏━┓╻ ╻┏━╸┏━┓   ┏━┓╻ ╻╻  ┏━╸┏━┓
# ┃  ┣━┫┗┳┛┣╸ ┣┳┛   ┣┳┛┃ ┃┃  ┣╸ ┗━┓
# ┗━╸╹ ╹ ╹ ┗━╸╹┗╸   ╹┗╸┗━┛┗━╸┗━╸┗━┛

layerrule = blur on, match:namespace logout
layerrule = no_anim on, match:namespace bar
layerrule = no_anim on, match:namespace notifications
layerrule = no_anim on, match:namespace audio_controls
layerrule = no_anim on, match:namespace system_controls
layerrule = no_anim on, match:namespace calendar
