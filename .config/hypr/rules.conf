# в”—в”»в”›в”—в”Ѓв”›в•№в”—в•ёв•№ в•№в”—в”Ѓв”›в•№  в•№ в•№в”—в”Ѓв•ёв”—в”Ѓв•ё   в•№в”—в•ёв”—в”Ѓв”›в”—в”Ѓв•ёв”—в”Ѓв•ёв”—в”Ѓв”›

workspace=special,gapsin:24,gapsout:64
workspace=special:browser,gapsin:24,gapsout:64
workspace=special:document,gapsin:24,gapsout:64
workspace=special:media,gapsin:24,gapsout:64

# Route apps to special workspaces
windowrule = workspace special:browser silent, match:class firefox
windowrule = workspace special:document silent, match:class org.pwmt.zathura
windowrule = workspace special:media silent, match:class mpv

