# ╻ ╻╻┏┓╻╺┳┓┏━┓╻ ╻   ┏━┓╻ ╻╻  ┏━╸┏━┓
# ┃╻┃┃┃┗┫ ┃┃┃ ┃┃╻┃   ┣┳┛┃ ┃┃  ┣╸ ┗━┓
# ┗┻┛╹╹ ╹╺┻┛┗━┛┗┻┛   ╹┗╸┗━┛┗━╸┗━╸┗━┛

windowrule = match:class ^(net.davidotek.pupgui2)$, float on
windowrule = match:class ^(yad)$, float on
windowrule = match:class ^(qt5ct)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(org.kde.ark)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-applet)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(com.obsproject.Studio)$, match:title ^(Controls)$, float on
windowrule = match:class ^(com.hyprland.layoutmanager)$, float on
windowrule = match:class ^(com.hyprland.layoutmanager)$, border_size 0
windowrule = match:class ^(com.hyprland.layoutmanager)$, no_shadow on
windowrule = match:class ^(org.pwmt.zathura)$, float on
windowrule = match:class ^(mpv)$, float on

# Pin MPV opened from Neovim (keeps it on top of other windows)
windowrule = match:title ^(nvim-mpv)$, pin on

# ╻ ╻┏━┓┏━┓╻┏ ┏━┓┏━┓┏━┓┏━╸┏━╸   ┏━┓╻ ╻╻  ┏━╸┏━┓
# ┃╻┃┃ ┃┣┳┛┣┻┓┗━┓┣━┛┣━┫┃  ┣╸    ┣┳┛┃ ┃┃  ┣╸ ┗━┓
# ┗┻┛┗━┛╹┗╸╹ ╹┗━┛╹  ╹ ╹┗━╸┗━╸   ╹┗╸┗━┛┗━╸┗━╸┗━┛

workspace=special,gapsin:24,gapsout:64

# ╻  ┏━┓╻ ╻┏━╸┏━┓   ┏━┓╻ ╻╻  ┏━╸┏━┓
# ┃  ┣━┫┗┳┛┣╸ ┣┳┛   ┣┳┛┃ ┃┃  ┣╸ ┗━┓
# ┗━╸╹ ╹ ╹ ┗━╸╹┗╸   ╹┗╸┗━┛┗━╸┗━╸┗━┛

layerrule = blur on, match:namespace logout
layerrule = no_anim on, match:namespace bar
layerrule = no_anim on, match:namespace notifications
layerrule = no_anim on, match:namespace audio_controls
layerrule = no_anim on, match:namespace system_controls
layerrule = no_anim on, match:namespace calendar
