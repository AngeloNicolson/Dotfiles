# Float all windows by default with consistent size
windowrule = float on, match:class (.*)
windowrule = size 75% 80%, match:class (.*)

# Foot terminal - semi-transparent
windowrule = opacity 0.92 0.88, match:class foot

# в•» в•»в”Џв”Ѓв”“в”Џв”Ѓв”“в•»в”Џ в”Џв”Ѓв”“в”Џв”Ѓв”“в”Џв”Ѓв”“в”Џв”Ѓв•ёв”Џв”Ѓв•ё   в”Џв”Ѓв”“в•» в•»в•»  в”Џв”Ѓв•ёв”Џв”Ѓв”“
