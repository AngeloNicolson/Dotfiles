# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Semi-transparent windows
windowrule = opacity 0.92 override 0.92 override, match:class ^foot$
windowrule = opacity 0.95 override 0.95 override, match:class ^com\.github\.flxzt\.rnote$

# Layout Designer should float
windowrule = float on, match:title ^Hyprland Layout Designer$
windowrule = size 1200 800, match:title ^Hyprland Layout Designer$

# All layout-managed windows should float (format: "layoutname - Window N - app")
# This applies to both standalone layouts and environment-created windows
# Tags used: lay_{layout}_ws_{ws}_pos_{pos} or env_{env}_lay_{layout}_ws_{ws}_pos_{pos}
windowrule = float on, match:initial_title ^.+ - Window \d+ - .+$


# Applications to workspaces
#windowrule = workspace 1, match:class ^foot$
#windowrule = workspace 2, match:class ^firefox$
#windowrule = workspace 3, match:title ^Obsidian$
windowrule = workspace 3, match:class ^com\.github\.flxzt\.rnote$
windowrule = tile on, match:class ^com\.github\.flxzt\.rnote$
windowrule = workspace 3, match:class ^org\.pwmt\.zathura$
windowrule = tile on, match:class ^org\.pwmt\.zathura$

# Workspaces and monitor assignments
workspace = name:1, monitor:HDMI-A-1, default:true
workspace = name:2, monitor:eDP-1, default:true
workspace = name:4, monitor:DP-2, default:true
workspace = name:5, monitor:DP-2, default:true
workspace = name:7, monitor:eDP-1, default:true
