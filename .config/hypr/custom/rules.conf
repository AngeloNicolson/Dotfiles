# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Only apply transparency to the terminal emulator "Foot"
windowrulev2 = opacity 0.97 override 0.97 override, class:(foot)

# Rnote transparency
windowrulev2 = opacity 0.97 override 0.97 override, class:(com.github.flxzt.rnote)

# Layout Designer should float and pin to all workspaces
windowrulev2 = float, title:(Hyprland Layout Designer)
windowrulev2 = size 1200 800, title:(Hyprland Layout Designer)
windowrulev2 = pin, title:(Hyprland Layout Designer)

# All layout-managed windows should float (format: "project - Window N - app")
windowrulev2 = float, initialTitle:^.+ - Window \d+ - .+$


# Applications to workspaces
#windowrulev2 = workspace:1, class:foot
#windowrulev2 = workspace:2, class:firefox
#windowrulev2 = workspace:3, title:Obsidian

# Workspaces and monitor assignments
workspace = name:1, monitor:HDMI-A-1, default:true
workspace = name:2, monitor:eDP-1, default:true
workspace = name:4, monitor:DP-2, default:true
workspace = name:5, monitor:DP-2, default:true
workspace = name:7, monitor:eDP-1, default:true




