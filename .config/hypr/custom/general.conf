# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/
#

#Screen Positioning
# HDMI-A-1 on the left
monitor=HDMI-A-1,1920x1080@60,0x0,1

# eDP-1 on the right
monitor=eDP-1,1920x1080@60,1920x0,1

# DP-2 below HDMI-A-1, aligned to right side of HDMI, in vertical/portrait mode (270° rotation)
#monitor=DP-2,1920x1080@60,840x1080,1,transform,3

# DP-2 normal horizontal view
monitor=DP-2,1920x1080@60,840x1080,1


