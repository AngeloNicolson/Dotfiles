# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing


# Auto-start applications
#exec-once = foot
#exec-once = firefox
#exec-once = obsidian

# OpenTabletDriver: Start daemon for Wacom tablet support
exec-once = otd-daemon

# Map tablet to initially focused monitor (2s delay for daemon startup)
exec-once = sleep 2 && ~/.config/hypr/scripts/tablet_map_focused.sh

# Auto-remap tablet when switching monitors (listens to focusedmon events)
exec-once = socat -U - UNIX-CONNECT:$XDG_RUNTIME_DIR/hypr/$HYPRLAND_INSTANCE_SIGNATURE/.socket2.sock | grep --line-buffered "^focusedmon>>" | while read -r line; do ~/.config/hypr/scripts/tablet_map_focused.sh; done

