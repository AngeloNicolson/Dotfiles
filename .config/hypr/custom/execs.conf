# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing


# Auto-start applications
#exec-once = foot
#exec-once = firefox
#exec-once = obsidian

# OpenTabletDriver: Detect screens and update tablet config before daemon starts
exec-once = ~/.config/hypr/scripts/tablet_detect_screens.sh

# OpenTabletDriver: Start daemon for Wacom tablet support
exec-once = otd-daemon

# Map tablet to initially focused monitor (2s delay for daemon startup)
exec-once = sleep 2 && ~/.config/hypr/scripts/tablet_map_focused.sh

# Unified tablet event listener (handles focus changes + monitor hotplug)
# Single efficient process instead of multiple socat listeners
exec-once = ~/.config/hypr/scripts/tablet_event_listener.sh

