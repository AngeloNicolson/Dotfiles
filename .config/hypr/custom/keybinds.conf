# You can put your preferred keybinds here
# https://wiki.hyprland.org/Configuring/Binds/

# Terminal
bind = $mainMod, return, exec, foot

# Layout Manager
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/layout_manager_unified.py

# Toggle layout snap daemon (auto-snap windows back to layout positions)
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/layout_snap_daemon.py toggle

# Window resizing
bind = $mainMod SHIFT, left, resizeactive, -40 0
bind = $mainMod SHIFT, right, resizeactive, 40 0
bind = $mainMod SHIFT, up, resizeactive, 0 -40
bind = $mainMod SHIFT, down, resizeactive, 0 40



