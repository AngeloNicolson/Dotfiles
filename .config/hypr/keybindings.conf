# вХївФП вФПвФБвХЄвХї вХївФПвФУ вХївФПвФУвХївХЇвФ≥вФУвХївФПвФУвХївФПвФБвХЄвФПвФБвФУ
# вФ£вФївФУвФ£вХЄ вФЧвФ≥вФЫвФ£вФївФУвФГвФГвФЧвФЂ вФГвФГвФГвФГвФЧвФЂвФГвХЇвФУвФЧвФБвФУ
# вХє вХєвФЧвФБвХЄ вХє вФЧвФБвФЫвХєвХє вХєвХЇвФївФЫвХєвХє вХєвФЧвФБвФЫвФЧвФБвФЫ

$mainMod = SUPER # windows key

# Window/Session actions
bind = $mainMod, X, exec, hyprctl dispatch killactive ""
bind = $mainMod, W, exec, ~/.config/hypr/scripts/togglefloating.sh
bind = ALT, F4, exec, hyprctl kill
bind = ALT, P, pin
bind = ALT, return, fullscreen
bind = $mainMod, L, exec, swaylock

# Ags keybinds
bind = $mainMod, Q, exec, ags request toggle-bar
bind = $mainMod, Tab, exec, ags request cycle-sidebar

# Application shortcuts (SUPER + SHIFT + key)
bind = $mainMod SHIFT, T, exec, kitty
bind = $mainMod SHIFT, E, exec, nemo
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, D, exec, vesktop
bind = $mainMod SHIFT, B, exec, blender
bind = $mainMod SHIFT, K, exec, ktouch

# Audio control
# bindl  = , F10, exec, ~/.config/hypr/scripts/volumecontrol.sh -o m # toggle audio mute
# bindel = , F11, exec, ~/.config/hypr/scripts/volumecontrol.sh -o d # decrease volume
# bindel = , F12, exec, ~/.config/hypr/scripts/volumecontrol.sh -o i # increase volume
# bindl  = , XF86AudioMute, exec, ~/.config/hypr/scripts/volumecontrol.sh -o m # toggle audio mute
# bindl  = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/volumecontrol.sh -i m # toggle microphone mute
# bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volumecontrol.sh -o d # decrease volume
# bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volumecontrol.sh -o i # increase volume

# Brightness control
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightnesscontrol.sh i # increase brightness
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightnesscontrol.sh d # decrease brightness

# Screenshot/Screencapture
bind = $mainMod, I, exec, ~/.config/hypr/scripts/screenshot.sh s # drag to snip an area / click on a window to print it
bind = $mainMod CTRL, I, exec, ~/.config/hypr/scripts/screenshot.sh sf # frozen screen, drag to snip an area / click on a window to print it
bind = $mainMod ALT, I, exec, ~/.config/hypr/scripts/screenshot.sh m # print focused monitor
bind = ,print, exec, ~/.config/hypr/scripts/screenshot.sh p  # print all monitor outputs

# Color picker
bind = $mainMod, P, exec, wl-color-picker # pick color and auto-copy to clipboard

# Custom scripts keybinds
# bind = $mainMod SHIFT, W, exec, pkill -x rofi || ~/.config/hypr/scripts/wallpaperselect.sh # rofi wall select menu
# bind = $mainMod, V, exec, pkill -x rofi || ~/.config/hypr/scripts/cliphist.sh c  # open Pasteboard in screen center
# bind = ,XF86PowerOff, exec, ~/.config/eww/shared/scripts/togglelogout.sh

# Move focus with ALT + WASD
bind = ALT, A, movefocus, l
bind = ALT, D, movefocus, r
bind = ALT, W, movefocus, u
bind = ALT, S, movefocus, d

# Cycle through windows on current workspace
bind = ALT, Tab, cyclenext

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, exec, hyprctl dispatch workspace 1
bind = $mainMod, 2, exec, hyprctl dispatch workspace 2
bind = $mainMod, 3, exec, hyprctl dispatch workspace 3
bind = $mainMod, 4, exec, hyprctl dispatch workspace 4
bind = $mainMod, 5, exec, hyprctl dispatch workspace 5

# Resize windows (SUPER + CTRL + arrows)
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Move active window to a workspace with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5

# Move active window around current workspace with mainMod + SHIFT + CTRL [вЖРвЖТвЖСвЖУ]
bind = $mainMod SHIFT $CONTROL, A, movewindow, l
bind = $mainMod SHIFT $CONTROL, D, movewindow, r
bind = $mainMod SHIFT $CONTROL, W, movewindow, u
bind = $mainMod SHIFT $CONTROL, S, movewindow, d

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/Resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Special workspace
bind = $mainMod, S, exec, hyprctl dispatch togglespecialworkspace
bind = $mainMod CTRL, S, movetoworkspacesilent, special

# Toggle Layout
bind = $mainMod, J, togglesplit, # dwindle

# Move window silently to workspace Super + Alt + [0-9]
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5

# Lid switch handling - behavior depends on external monitor
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid_handler.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid_handler.sh open
bind = , XF86PowerOff, exec, systemctl suspend && hyprlock
