# в•»в”Џ в”Џв”Ѓв•ёв•» в•»в”Џв”“ в•»в”Џв”“в•»в•єв”ів”“в•»в”Џв”“в•»в”Џв”Ѓв•ёв”Џв”Ѓв”“
# в”Јв”»в”“в”Јв•ё в”—в”ів”›в”Јв”»в”“в”ѓв”ѓв”—в”« в”ѓв”ѓв”ѓв”ѓв”—в”«в”ѓв•єв”“в”—в”Ѓв”“
# в•№ в•№в”—в”Ѓв•ё в•№ в”—в”Ѓв”›в•№в•№ в•№в•єв”»в”›в•№в•№ в•№в”—в”Ѓв”›в”—в”Ѓв”›

$mainMod = SUPER # windows key

# Modifier rules:
#   SUPER                вЂ” focus & navigate (workspaces, windows, desktop UI)
#   SUPER + SHIFT        вЂ” move & send (push windows to workspaces/positions)
#   SUPER + CTRL         вЂ” window properties (resize, float, pin, fullscreen, kill, layout)
#   ALT                  вЂ” app launching & standard shortcuts (Tab, F4)

# в”Ђв”Ђ Focus & Navigate (SUPER + HJKL / 1-5) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, 1, exec, hyprctl dispatch workspace 1
bind = $mainMod, 2, exec, hyprctl dispatch workspace 2
bind = $mainMod, 3, exec, hyprctl dispatch workspace 3
bind = $mainMod, 4, exec, hyprctl dispatch workspace 4
bind = $mainMod, 5, exec, hyprctl dispatch workspace 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspaces
bind = $mainMod, B, togglespecialworkspace, browser
bind = $mainMod, D, togglespecialworkspace, document
bind = $mainMod, M, togglespecialworkspace, media
bind = $mainMod, S, exec, hyprctl dispatch togglespecialworkspace

# в”Ђв”Ђ Move & Send (SUPER + SHIFT + HJKL / 1-5) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

bind = $mainMod SHIFT, B, movetoworkspacesilent, special:browser
bind = $mainMod SHIFT, D, movetoworkspacesilent, special:document
bind = $mainMod SHIFT, M, movetoworkspacesilent, special:media
bind = $mainMod SHIFT, S, movetoworkspacesilent, special

# в”Ђв”Ђ Window Properties (SUPER + CTRL) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

# Resize (HJKL / arrows)
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

bind = $mainMod CTRL, X, exec, hyprctl dispatch killactive ""
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/togglefloating.sh
bind = $mainMod CTRL, P, pin
bind = $mainMod CTRL, Return, fullscreen
bind = $mainMod CTRL, T, layoutmsg, togglesplit # dwindle

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# в”Ђв”Ђ Desktop UI (SUPER) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

# AGS
bind = $mainMod, Q, exec, ags request toggle-bar
bind = $mainMod, Tab, exec, ags request cycle-sidebar
bind = $mainMod SHIFT, Tab, exec, ags request cycle-sidebar-back
bind = $mainMod, G, togglespecialworkspace, kondor
bind = $mainMod, T, exec, ags request toggle-periodic-table

# Screenshot
bind = $mainMod, I, exec, ~/.config/hypr/scripts/screenshot.sh s # drag to snip / click window
bind = $mainMod CTRL, I, exec, ~/.config/hypr/scripts/screenshot.sh sf # frozen screen snip
bind = $mainMod SHIFT, I, exec, ~/.config/hypr/scripts/screenshot.sh m # print focused monitor
bind = , print, exec, ~/.config/hypr/scripts/screenshot.sh p # print all monitors

# Color picker
bind = $mainMod, P, exec, wl-color-picker

# Snap windows to layout positions
bind = $mainMod, R, exec, ~/.config/hypr/scripts/snap_to_layout.py

# в”Ђв”Ђ App Launching (ALT) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

bind = ALT, Return, exec, foot
bind = ALT, F, exec, firefox
bind = ALT, D, exec, vesktop
bind = ALT, E, exec, nemo
bind = ALT, B, exec, blender
bind = ALT, K, exec, ktouch
bind = ALT, L, exec, swaylock
bind = ALT, Tab, cyclenext
bind = ALT, F4, exec, hyprctl kill

# в”Ђв”Ђ Hardware & System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

# Brightness
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightnesscontrol.sh i
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightnesscontrol.sh d

# Lid switch
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid_handler.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid_handler.sh open
bind = , XF86PowerOff, exec, systemctl suspend && hyprlock
