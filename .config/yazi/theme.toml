[manager]
cwd = { fg = "#ebdbb2" }
hovered = { fg = "#1d2021", bg = "#d79921" }
preview_hovered = { underline = true }
find_keyword = { fg = "#fabd2f", bold = true }
find_position = { fg = "#d3869b", italic = true }
marker_selected = { fg = "#b8bb26", bg = "#b8bb26" }
marker_copied = { fg = "#fabd2f", bg = "#fabd2f" }
marker_cut = { fg = "#fb4934", bg = "#fb4934" }
tab_active = { fg = "#1d2021", bg = "#d79921" }
tab_inactive = { fg = "#a89984", bg = "#3c3836" }
tab_width = 1
border_symbol = "│"
border_style = { fg = "#3c3836" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#3c3836", bg = "#3c3836" }
mode_normal = { fg = "#1d2021", bg = "#d79921", bold = true }
mode_select = { fg = "#1d2021", bg = "#b8bb26", bold = true }
mode_unset = { fg = "#1d2021", bg = "#fb4934", bold = true }
progress_label = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#3c3836", bg = "#1d2021" }
progress_error = { fg = "#fb4934", bg = "#1d2021" }
permissions_t = { fg = "#b8bb26" }
permissions_r = { fg = "#fabd2f" }
permissions_w = { fg = "#fb4934" }
permissions_x = { fg = "#8ec07c" }
permissions_s = { fg = "#928374" }

[input]
border = { fg = "#d79921" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#d79921" }
active = { fg = "#d3869b" }
inactive = {}

[tasks]
border = { fg = "#d79921" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#3c3836" }
cand = { fg = "#8ec07c" }
rest = { fg = "#928374" }
desc = { fg = "#d3869b" }
separator = "  "
separator_style = { fg = "#3c3836" }

[help]
on = { fg = "#d3869b" }
exec = { fg = "#8ec07c" }
desc = { fg = "#928374" }
hovered = { bg = "#3c3836", bold = true }
footer = { fg = "#1d2021", bg = "#ebdbb2" }

[filetype]
rules = [
  { mime = "image/*", fg = "#8ec07c" },
  { mime = "video/*", fg = "#fabd2f" },
  { mime = "audio/*", fg = "#d3869b" },
  { mime = "application/zip", fg = "#fb4934" },
  { mime = "application/gzip", fg = "#fb4934" },
  { mime = "application/x-tar", fg = "#fb4934" },
  { name = "*/", fg = "#83a598", bold = true },
]
